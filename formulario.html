<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Productos Faltantes - Bierport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="date"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
        }
        
        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-submit:active {
            transform: translateY(0);
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-clear:hover {
            background: #e0e0e0;
        }
        
        .message {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
        
        .info-box {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            color: #555;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛒 Bierport</div>
            <h1 style="color: #333; margin-bottom: 5px;">Productos Faltantes</h1>
            <p class="subtitle">Registra lo que pidieron los clientes</p>
        </div>
        
        <div class="info-box">
            ℹ️ Cada producto que registres se sumará a la lista de compras del día.
        </div>
        
        <div class="message" id="message"></div>
        <div class="loading" id="loading">Enviando...</div>
        
        <form id="productForm">
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            
            <div class="form-group">
                <label for="turno">Turno</label>
                <select id="turno" required>
                    <option value="">-- Selecciona turno --</option>
                    <option value="Mañana">Mañana</option>
                    <option value="Tarde">Tarde</option>
                    <option value="Noche">Noche</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="vendedor">Tu nombre</label>
                <input type="text" id="vendedor" placeholder="Ej: Juan García" required>
            </div>
            
            <div class="form-group">
                <label for="producto">Producto faltante</label>
                <input type="text" id="producto" placeholder="Ej: Cerveza Corona, Agua mineral, etc" required autofocus>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn-submit">Registrar</button>
                <button type="reset" class="btn-clear">Limpiar</button>
            </div>
        </form>
    </div>

    <script>
        // Establecer fecha de hoy por defecto
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('fecha').value = hoy;

        // URL del Apps Script (IMPORTANTE: reemplazar con la URL real)
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsgevCZF_xaOOoEcdFBNxCTDGqmyYVpdOO4enDtAMTas6dO0P0YfzjhfWcQIsHypMI_Q/exec';

        const form = document.getElementById('productForm');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fecha = document.getElementById('fecha').value;
            const turno = document.getElementById('turno').value;
            const vendedor = document.getElementById('vendedor').value;
            const producto = document.getElementById('producto').value;

            messageDiv.style.display = 'none';
            loadingDiv.style.display = 'block';

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: new URLSearchParams({
                        fecha: fecha,
                        turno: turno,
                        vendedor: vendedor,
                        producto: producto
                    })
                });

                if (response.ok || response.status === 0) {
                    showMessage('✅ Producto registrado correctamente', 'success');
                    form.reset();
                    document.getElementById('fecha').value = hoy;
                    document.getElementById('producto').focus();
                } else {
                    showMessage('⚠️ Hubo un problema al enviar el dato', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Error de conexión. Verifica la URL del servidor.', 'error');
            } finally {
                loadingDiv.style.display = 'none';
            }
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
            }
        }
    </script>
</body>
</html>
