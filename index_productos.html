<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos Faltantes - Bierport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            font-size: 44px;
            margin-bottom: 10px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 5px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .info-box {
            background: #e7f3ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #333;
            line-height: 1.6;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f9f7ff;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-submit {
            background: #667eea;
            color: white;
        }
        
        .btn-submit:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .btn-clear {
            background: #f0f0f0;
            color: #666;
        }
        
        .btn-clear:hover {
            background: #e0e0e0;
        }
        
        .message {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📦</div>
            <h1>Productos Faltantes</h1>
            <p class="subtitle">Registra productos que solicitan los clientes</p>
        </div>
        
        <div class="info-box">
            ℹ️ Cuando un cliente pida un producto que no tenemos, regístralo aquí. Estos datos se usan para mejorar el stock.
        </div>
        
        <div class="message" id="message"></div>
        <div class="loading" id="loading">Enviando...</div>
        
        <form id="formulario">
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" required readonly style="background-color: #f9f9f9; color: #666;">
            </div>
            
            <div class="form-group">
                <label for="turno">Turno</label>
                <select id="turno" required>
                    <option value="">-- Selecciona turno --</option>
                    <option value="Mañana">🌅 Mañana (07:00 - 15:59)</option>
                    <option value="Noche">🌙 Noche (16:00 - 23:59)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="vendedor">Tu Nombre</label>
                <input type="text" id="vendedor" placeholder="Nombre completo" required>
            </div>
            
            <div class="form-group">
                <label for="producto">Producto Solicitado</label>
                <input type="text" id="producto" placeholder="Ej: Leche entera, Yogur griego, etc." required>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn-submit">✅ Registrar Producto</button>
                <button type="reset" class="btn-clear">🔄 Limpiar</button>
            </div>
        </form>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwsgevCZF_xaOOoEcdFBNxCTDGqmyYVpdOO4enDtAMTas6dO0P0YfzjhfWcQIsHypMI_Q/exec';
        
        function establecerFecha() {
            const hoy = new Date().toISOString().split('T')[0];
            document.getElementById('fecha').value = hoy;
        }
        
        function determinarTurno() {
            const hora = new Date().getHours();
            if (hora >= 7 && hora < 16) {
                document.getElementById('turno').value = 'Mañana';
            } else {
                document.getElementById('turno').value = 'Noche';
            }
        }
        
        document.getElementById('formulario').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fecha = document.getElementById('fecha').value;
            const turno = document.getElementById('turno').value;
            const vendedor = document.getElementById('vendedor').value;
            const producto = document.getElementById('producto').value;
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('message').style.display = 'none';
            
            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: new URLSearchParams({
                        tipo: 'productos',
                        fecha: fecha,
                        turno: turno,
                        vendedor: vendedor,
                        producto: producto
                    })
                });
                
                if (response.ok || response.status === 0) {
                    mostrarMensaje('✅ Producto registrado correctamente', 'success');
                    document.getElementById('formulario').reset();
                    establecerFecha();
                    determinarTurno();
                } else {
                    mostrarMensaje('❌ Error al guardar', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                mostrarMensaje('❌ Error de conexión', 'error');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        });
        
        function mostrarMensaje(texto, tipo) {
            const element = document.getElementById('message');
            element.textContent = texto;
            element.className = `message ${tipo}`;
            element.style.display = 'block';
            
            if (tipo === 'success') {
                setTimeout(() => {
                    element.style.display = 'none';
                }, 3000);
            }
        }
        
        window.addEventListener('load', () => {
            establecerFecha();
            determinarTurno();
        });
    </script>
</body>
</html>
